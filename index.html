<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Hesap Makinesi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sayfa">
    <header class="baslik">
      <div>
        <p class="etiket">Modern</p>
        <h1>Hesap Makinesi</h1>
      </div>
      <span class="sub">4 işlem + akıllı akış</span>
    </header>

    <main class="icerik">
      <section class="makine">
        <div class="ekran">
          <div id="gecmis" class="gecmis"></div>
          <div id="gosterge" class="gosterge">0</div>
        </div>
        <div class="tuslar">
          <button class="ikincil" data-aksiyon="temizle">AC</button>
          <button class="ikincil" data-aksiyon="sil">⌫</button>
          <button class="operator" data-operator="/">÷</button>
          <button class="operator" data-operator="*">×</button>

          <button data-sayi="7">7</button>
          <button data-sayi="8">8</button>
          <button data-sayi="9">9</button>
          <button class="operator" data-operator="-">−</button>

          <button data-sayi="4">4</button>
          <button data-sayi="5">5</button>
          <button data-sayi="6">6</button>
          <button class="operator" data-operator="+">+</button>

          <button data-sayi="1">1</button>
          <button data-sayi="2">2</button>
          <button data-sayi="3">3</button>
          <button class="genis" id="esittir">=</button>

          <button class="genis" data-sayi="0">0</button>
          <button data-aksiyon="virgul">,</button>
        </div>
      </section>

      <section class="ipuclari">
        <h3>İpuçları</h3>
        <ul>
          <li>AC ile temizleyip sıfırlayabilirsin.</li>
          <li>İşlemleri seri şekilde dizip = ile sonucu al.</li>
          <li>Klavye ile rakam ve + − × ÷ tuşları da çalışır.</li>
        </ul>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
