<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINANCE - Kripto Borsa Arayüzü</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-light">
  <div class="arka-plan"></div>
  <header class="ust-cubuk">
    <div class="logo">MINANCE</div>
    <div class="arama-kapsayici">
      <input type="text" placeholder="Coin ara (yakında)">
    </div>
    <button class="tema-dugmesi" aria-label="Tema değiştir" title="Tema değiştir">
      <span class="ikon ikon-gunes">☀️</span>
      <span class="ikon ikon-ay">🌙</span>
      <span class="anahtar"></span>
    </button>
  </header>

  <main class="icerik">
    <section class="hosgeldin">
      <h1>Yeni nesil kripto deneyimine hazır ol.</h1>
      <p>Şu anda sadece arayüzü hazırlıyoruz. Arama ve diğer özellikler yakında burada olacak.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
