<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>baluk.ai</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>baluk.ai</h1>
        <p>Mesajını yaz, cevap backend’den gelsin.</p>
      </header>

      <section id="chat" class="chat" aria-live="polite" aria-label="Sohbet mesajları"></section>

      <form id="chatForm" class="composer">
        <input
          id="messageInput"
          name="message"
          type="text"
          autocomplete="off"
          placeholder="Mesajını yaz..."
          required
        />
        <button type="submit">Gönder</button>
      </form>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
