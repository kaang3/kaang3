<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>GAI 2.0 - Karar Ağacı Asistanı</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="parlama"></div>
  <header class="ust">
    <div class="marka">
      <span class="marka-adi">GAI 2.0</span>
      <span class="model-etiket">Karar ağacı + modüler beceriler</span>
    </div>
    <div class="ust-aksiyon">
      <button id="resetBtn" class="dugme ikincil">Sohbeti Sıfırla</button>
      <button id="oturumButon" class="dugme hesap">
        <span class="hesap-ikon">👤</span>
        <span id="hesapKimlik">Oturum aç</span>
      </button>
    </div>
  </header>

  <main class="icerik">
    <section id="sohbetAlani" class="sohbet"></section>
    <div id="dusunKart" class="dusun-kart gizli" aria-live="polite">
      <div class="logo-donus" aria-hidden="true"></div>
      <div class="dusun-icerik">
        <div class="dusun-baslik">Gai düşünüyor...</div>
        <div id="dusunMetin" class="dusun-metin">Cevabını hazırlıyorum</div>
      </div>
    </div>
    <div class="girdi-kapsayici">
      <div class="girdi-ust">
        <div id="webEtiketi" class="web-etiket gizli" aria-live="polite">
          <span class="ikon">🌐</span> Web'e bağlı
          <button id="webKapat" class="etiket-kapat" aria-label="Web bağlantısını kapat">✕</button>
        </div>
        <div class="model-parlak">
          <span class="model-parlak-ikon">✨</span>
          <div class="model-parlak-icerik">
            <div class="model-parlak-baslik">GAI 2.0 övülüyor</div>
            <div class="model-parlak-alt">Karar ağacı + modül + web arama + hesaplama</div>
          </div>
        </div>
      </div>
      <div class="ozellik-rotator" aria-live="polite">
        <div class="ozellik-etiket">GAI 2.0 özellikleri</div>
        <div class="ozellik-metin" id="ozellikMetni">Karar ağacı yönlendirmesi ve modüler beceri seçimi</div>
      </div>
      <div class="girdi-cubugu">
        <div class="girdi-ekleri">
          <button id="artiBtn" class="ikon-dugme" aria-haspopup="true" aria-expanded="false">+</button>
          <div id="artiMenu" class="arti-menu gizli" role="menu">
            <button id="webBaglan" class="menu-ogesi" role="menuitem">
              <span class="ikon">🌐</span>
              <span id="webBaglanMetni">Web'e bağlan</span>
            </button>
          </div>
        </div>
        <textarea id="girdi" rows="3" placeholder="Sorunu veya mesajını yaz..." aria-label="Mesaj"></textarea>
        <button id="gonderBtn" class="dugme primer">Gönder</button>
      </div>
      <div id="sonuc" class="durum" aria-live="polite">Hazır.</div>
    </div>
  </main>

  <div class="modal" id="oturumModal">
    <div class="modal-icerik">
      <h3>Oturum aç</h3>
      <label for="ad">Ad</label>
      <input type="text" id="ad" placeholder="Adınız">
      <label for="soyad">Soyad</label>
      <input type="text" id="soyad" placeholder="Soyadınız">
      <div class="modal-aksiyon">
        <button id="modalIptal" class="dugme ikincil">İptal</button>
        <button id="modalKaydet" class="dugme primer">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
