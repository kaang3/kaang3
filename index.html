<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML + CSS + JavaScript Öğretici</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="ust">
    <h1>HTML + CSS + JavaScript Öğretici</h1>
    <p>
      Ders 1'den başlayıp ileri seviyeye çıkan, sade ve uygulamalı bir yol haritası.
      Toplam <strong id="soruSayisi">0</strong> soru ile ilerlersin.
    </p>
  </header>

  <main class="kapsayici">
    <aside class="dersler" id="dersListesi"></aside>

    <section class="icerik">
      <article class="kart" id="dersDetay">
        <h2>Hazırsan başlayalım 🚀</h2>
        <p>Soldan bir ders seç. Her derste:</p>
        <ul>
          <li>Kısa konu anlatımı,</li>
          <li>Uygulama görevi,</li>
          <li>Test soruları olacak.</li>
        </ul>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
