<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Blok Dünyası</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay">
    <h1>Blok Dünyası</h1>
    <p>WASD ile yürü, Space ile zıpla. Sol tık blok kırar, sağ tık (veya Alt) blok ekler. 1-3 ile blok seç.</p>
    <button id="basla">Keşfetmeye Başla</button>
  </div>
  <div id="hud">
    <div id="blokSecim">
      <span data-tip="0" class="secili">Çimen</span>
      <span data-tip="1">Toprak</span>
      <span data-tip="2">Taş</span>
    </div>
  </div>
  <div id="ipucu">Sol tık: kır | Sağ tık/Alt: ekle | 1-3: blok değiştir | R: konumu sıfırla</div>
  <script type="module" src="script.js"></script>
</body>
</html>
