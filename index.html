<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gai 1.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-chip">Gai-1.0</span>
        <div>
          <h1>Gai</h1>
          <p>Bağlamsal, hızlı ve net yanıtlar</p>
        </div>
      </div>
      <div class="actions">
        <div class="status" id="durum">Hazır</div>
        <button type="button" class="secondary" id="temizle">Sohbeti temizle</button>
      </div>
    </header>

    <main class="chat" id="sohbet">
      <div class="message bot">
        Merhaba. Gai burada.
      </div>
    </main>

    <form class="composer" id="gaiForm">
      <input
        type="text"
        id="girdi"
        placeholder="Bir şey sor..."
        autocomplete="off"
        required
      />
      <button type="submit">Gönder</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
