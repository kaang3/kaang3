<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Gai - Akıllı Sohbet Alanı</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="yan-menu" aria-label="Sohbet geçmişi">
      <div class="yan-ust">
        <div class="yan-kimlik">
          <span class="yan-logo" aria-hidden="true">G</span>
          <span class="yan-baslik">Gai</span>
        </div>
        <button id="yeniSohbet" class="yan-yeni" type="button">+ Yeni sohbet</button>
      </div>
      <nav class="yan-nav">
        <h2>Son sohbetler</h2>
        <ul id="sohbetListesi" class="sohbet-listesi" aria-live="polite"></ul>
      </nav>
    </aside>

    <div class="ana-bolum">
      <header class="ust-cubuk">
        <div class="marka">
          <div class="logo-ikon" aria-hidden="true">
            <span class="logo-harf">G</span>
          </div>
          <div class="marka-metinleri">
            <h1>Gai</h1>
            <p>Sade ve odaklı sohbet alanı</p>
          </div>
        </div>
        <div class="oturum-alani">
          <div class="oturum-etiket">
            <p class="oturum-slogan">Gai her zaman hazır, giriş gerekmez.</p>
          </div>
        </div>
      </header>

      <main class="merkez" aria-live="polite">
        <section id="sohbet" class="sohbet-panel" aria-labelledby="sohbetBaslik">
          <div class="sohbet-ust">
            <h2 id="sohbetBaslik">Görüşme Alanı</h2>
            <p class="sohbet-alt">Sorularını yaz, Gai hemen yanıtlasın.</p>
          </div>
          <div id="mesajlar" class="mesajlar-kapsayici"></div>
          <form id="girdiFormu" class="girdi-formu" autocomplete="off">
            <label class="gizli" for="kullaniciMesaji">Sohbet metni</label>
            <input type="text" id="kullaniciMesaji" placeholder="Mesajını yaz..." required>
            <button type="submit">Gönder</button>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
