<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Gai - Sohbet Asistanı</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="baslik">
        <div class="logo-ikon" aria-hidden="true">G</div>
        <div>
          <h1>Gai</h1>
          <p>Kapsamlı kelime haznesiyle yanıt veren sohbet yol arkadaşın</p>
        </div>
      </div>
      <button id="panelToggle" class="panel-toggle" type="button" aria-controls="bilgiPaneli" aria-expanded="true">
        Bilgi panelini gizle
      </button>
    </header>

    <main>
      <section id="sohbet">
        <div id="mesajlar" aria-live="polite"></div>
        <form id="girdiFormu">
          <label class="gizli" for="kullaniciMesaji">Sorunuzu yazın</label>
          <input type="text" id="kullaniciMesaji" placeholder="Sorunuzu veya isteğinizi yazın..." autocomplete="off" required>
          <button type="submit">Gönder</button>
        </form>
      </section>

      <aside id="bilgiPaneli">
        <h2>Ne Yapabilirim?</h2>
        <ul>
          <li>Selamlaşın, güncel durumunuzu paylaşın.</li>
          <li>Bilim, sanat, tarih ve kültür hakkında sorular yöneltin.</li>
          <li>Deyimler, atasözleri ve kelime açıklamaları isteyin.</li>
          <li>Düşüncelerinizi tartışın, öneri ve ilham alın.</li>
        </ul>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
