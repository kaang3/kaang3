<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MemTube</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Kayıt Ekranı -->
  <div id="girisEkrani">
    <h2>MemTube'e Giriş</h2>
    <input type="text" id="kullaniciAdi" placeholder="Takma Ad (zorunlu)">
    <input type="file" id="profilResmi" accept="image/*">
    <button onclick="girisYap()">Giriş Yap</button>
  </div>

  <!-- Ana Ekran -->
  <div id="anaEkran" class="gizli">
    <header>
      <h1>📺 MemTube</h1>
      <input type="text" id="arama" placeholder="Ara...">
    </header>

    <!-- Ana Sayfa -->
    <main id="anaSayfa">
      <section id="aiPaneli" class="kart">
        <div class="kart-baslik">
          <h3>🎮 Oyun İçi Yapay Zeka (Kural Tabanlı)</h3>
          <p>Sağlık, mesafe ve mühimmat durumuna göre NPC eylemi önerir.</p>
        </div>
        <div class="form-satir">
          <label for="saglik">Sağlık (%)</label>
          <input type="number" id="saglik" min="0" max="100" value="75">
        </div>
        <div class="form-satir">
          <label for="mesafe">Düşman Mesafesi (m)</label>
          <input type="number" id="mesafe" min="0" max="200" value="30">
        </div>
        <div class="form-satir">
          <label for="mermi">Mühimmat</label>
          <input type="number" id="mermi" min="0" max="200" value="20">
        </div>
        <div class="form-satir">
          <label for="morale">Morâl</label>
          <select id="morale">
            <option value="yüksek">Yüksek</option>
            <option value="orta" selected>Orta</option>
            <option value="düşük">Düşük</option>
          </select>
        </div>
        <button id="kararBtn">Karar Ver</button>
        <div id="kararSonucu" class="kart-sonuc">Hazır.</div>
      </section>
      <div id="videoListe" class="video-galeri"></div>
    </main>

    <!-- Hesabım Sayfası -->
    <section id="hesabim" class="gizli">
      <div id="profil">
        <img id="profilGorsel" alt="Profil Resmi">
        <h3 id="kAdi"></h3>
      </div>
      <h4>Videolarım</h4>
      <input type="file" id="videoDosyasi" accept="video/*">
      <input type="text" id="videoBaslik" placeholder="Video Başlığı">
      <button onclick="videoYukle()">+ Yükle</button>
      <div id="videolar" class="video-galeri"></div>
    </section>

    <!-- Alt Menü -->
    <nav id="altMenu">
      <button onclick="goAnaSayfa()">🏠</button>
      <button onclick="goHesabim()">👤</button>
    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
